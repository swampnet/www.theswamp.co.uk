<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Swamp</title>
    <base href="/pwa/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <script type="importmap"></script>

    <!-- Here's the PWA stuff'-->
    <link href="manifest.webmanifest" rel="manifest" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script>
        window._installPrompt = null;
        window._installDotnetRef = null;

        window.addEventListener('beforeinstallprompt', function (e) {
            e.preventDefault();
            window._installPrompt = e;
            if (window._installDotnetRef) {
                window._installDotnetRef.invokeMethodAsync('OnInstallPromptAvailable');
            }
        });

        window.addEventListener('appinstalled', function () {
            window._installPrompt = null;
        });

        window.pwaIsInstallable = function () {
            return !!window._installPrompt;
        };

        window.pwaRegisterInstallCallback = function (dotnetRef) {
            window._installDotnetRef = dotnetRef;
            if (window._installPrompt) {
                dotnetRef.invokeMethodAsync('OnInstallPromptAvailable');
            }
        };

        window.pwaInstall = async function () {
            if (!window._installPrompt) { return false; }
            window._installPrompt.prompt();
            const result = await window._installPrompt.userChoice;
            if (result.outcome === 'accepted') {
                window._installPrompt = null;
            }
            return result.outcome === 'accepted';
        };
    </script>

    <!-- Non-fingerprinted path: OverrideHtmlAssetPlaceholders is not used so this must be
         a literal filename. Both fingerprinted and non-fingerprinted routes are served by
         MapStaticAssets; the non-fingerprinted version uses Cache-Control: no-cache. -->
    <script src="_framework/blazor.webassembly.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>
</body>

</html>
