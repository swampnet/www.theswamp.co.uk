# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - theswamp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build src/TheSwamp.WWW/TheSwamp.WWW.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish src/TheSwamp.WWW/TheSwamp.WWW.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp /p:InformationalVersion=1.0.${{ github.run_number }}

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B835F8BF8909454AA266B5AAF88CFB24 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3FEFCCB617A54398A367DC25EA291EE7 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_08F063D2523342D8B615BD135F415E2E }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'theswamp'
          slot-name: 'Production'
          package: .
          startup-command: 'dotnet TheSwamp.WWW.dll'
          